services:
  postgres:
    image: postgres:16
    container_name: mro-postgres
    environment:
      POSTGRES_DB: mro
      POSTGRES_USER: mro
      POSTGRES_PASSWORD: mro
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mro -d mro"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:

