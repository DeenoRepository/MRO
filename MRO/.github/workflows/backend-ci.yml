name: Backend CI

on:
  push:
    branches: ["master"]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "gradle"

      - name: Ensure wrapper executable
        run: chmod +x gradlew

      - name: Compile Kotlin
        run: ./gradlew compileKotlin --no-daemon

      - name: Run tests
        run: ./gradlew test --no-daemon
