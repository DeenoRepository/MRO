openapi: 3.0.3
info:
  title: Service Request System (SRS) API
  version: 1.0.0
  description: API for tickets, service requests, request types, comments, and attachments.
servers:
  - url: /api/v1
paths:
  /srs/request-types:
    get:
      summary: List all request types
      operationId: getRequestTypes
      security:
        - basicAuth: []
      responses:
        '200':
          description: A list of request types.
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/ApiMeta'
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/RequestTypeResponse'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
    post:
      summary: Create request type
      operationId: createRequestType
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRequestTypeRequest'
      responses:
        '201':
          description: Request type created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/ApiMeta'
                  data:
                    $ref: '#/components/schemas/RequestTypeResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'

  /srs/request-types/{id}:
    get:
      summary: Get request type by ID
      operationId: getRequestTypeById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - basicAuth: []
      responses:
        '200':
          description: Request type details.
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/ApiMeta'
                  data:
                    $ref: '#/components/schemas/RequestTypeResponse'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'
    put:
      summary: Update request type
      operationId: updateRequestType
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRequestTypeRequest'
      responses:
        '200':
          description: Request type updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/ApiMeta'
                  data:
                    $ref: '#/components/schemas/RequestTypeResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'
    delete:
      summary: Deactivate request type
      operationId: deactivateRequestType
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - basicAuth: []
      responses:
        '200':
          description: Request type deactivated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/ApiMeta'
                  data:
                    $ref: '#/components/schemas/RequestTypeResponse'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'

  /srs/tickets:
    get:
      summary: List and search tickets
      operationId: getTickets
      parameters:
        - name: ticketNumber
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [OPEN, ASSIGNED, IN_PROGRESS, WAITING_EXTERNAL, RESOLVED, CLOSED, CANCELLED]
        - name: priority
          in: query
          required: false
          schema:
            type: string
        - name: requestTypeId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: requesterId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: assigneeId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: equipmentId
          in: query
          required: false
          schema:
            type: string
            format: uuid
      security:
        - basicAuth: []
      responses:
        '200':
          description: A list of tickets.
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/ApiMeta'
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TicketResponse'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
    post:
      summary: Create ticket
      operationId: createTicket
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTicketRequest'
      responses:
        '201':
          description: Ticket created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/ApiMeta'
                  data:
                    $ref: '#/components/schemas/TicketResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'

  /srs/tickets/{id}:
    get:
      summary: Get ticket by ID
      operationId: getTicketById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - basicAuth: []
      responses:
        '200':
          description: Ticket details.
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/ApiMeta'
                  data:
                    $ref: '#/components/schemas/TicketResponse'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'

  /srs/tickets/{id}/assign:
    post:
      summary: Assign ticket
      operationId: assignTicket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignTicketRequest'
      responses:
        '200':
          description: Ticket assigned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/ApiMeta'
                  data:
                    $ref: '#/components/schemas/TicketResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'

  /srs/tickets/{id}/resolve:
    post:
      summary: Resolve ticket
      operationId: resolveTicket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - basicAuth: []
      responses:
        '200':
          description: Ticket resolved.
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/ApiMeta'
                  data:
                    $ref: '#/components/schemas/TicketResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'

  /srs/tickets/{id}/close:
    post:
      summary: Close ticket
      operationId: closeTicket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - basicAuth: []
      responses:
        '200':
          description: Ticket closed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/ApiMeta'
                  data:
                    $ref: '#/components/schemas/TicketResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'

  /srs/tickets/{id}/status:
    post:
      summary: Change ticket status
      operationId: changeTicketStatus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeTicketStatusRequest'
      responses:
        '200':
          description: Ticket status updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/ApiMeta'
                  data:
                    $ref: '#/components/schemas/TicketResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'

  /srs/tickets/{id}/comments:
    get:
      summary: Get ticket comments
      operationId: getTicketComments
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - basicAuth: []
      responses:
        '200':
          description: A list of ticket comments.
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/ApiMeta'
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TicketCommentResponse'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'
    post:
      summary: Add ticket comment
      operationId: addTicketComment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddTicketCommentRequest'
      responses:
        '201':
          description: Comment added.
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/ApiMeta'
                  data:
                    $ref: '#/components/schemas/TicketCommentResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'

  /srs/tickets/{id}/attachments:
    get:
      summary: List attachments for a ticket
      operationId: getTicketAttachments
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - basicAuth: []
      responses:
        '200':
          description: A list of ticket attachments.
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/ApiMeta'
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TicketAttachmentResponse'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'
    post:
      summary: Upload ticket attachment
      operationId: uploadTicketAttachment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
                - file
      responses:
        '201':
          description: Attachment uploaded successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/ApiMeta'
                  data:
                    $ref: '#/components/schemas/TicketAttachmentResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'

  /srs/tickets/attachments/{attachmentId}/download:
    get:
      summary: Download a ticket attachment file
      operationId: downloadTicketAttachment
      parameters:
        - name: attachmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - basicAuth: []
      responses:
        '200':
          description: Binary attachment file content.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'

  /srs/tickets/{id}/create-work-order:
    post:
      summary: Create work order from ticket
      operationId: createWorkOrderFromTicket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - basicAuth: []
      responses:
        '200':
          description: Updated ticket details (with linked work order).
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/ApiMeta'
                  data:
                    $ref: '#/components/schemas/TicketResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
  schemas:
    ApiMeta:
      type: object
      properties:
        requestId:
          type: string
          nullable: true
    ApiErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string
        requestId:
          type: string
          nullable: true
    CreateRequestTypeRequest:
      type: object
      required:
        - code
        - name
      properties:
        code:
          type: string
          maxLength: 64
        name:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
        defaultPriority:
          type: string
          maxLength: 32
          default: MEDIUM
        slaHours:
          type: integer
          minimum: 1
          maximum: 8760
          nullable: true
    UpdateRequestTypeRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
        defaultPriority:
          type: string
          maxLength: 32
          default: MEDIUM
        slaHours:
          type: integer
          minimum: 1
          maximum: 8760
          nullable: true
        isActive:
          type: boolean
          default: true
    RequestTypeResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        defaultPriority:
          type: string
        slaHours:
          type: integer
          nullable: true
        isActive:
          type: boolean
    CreateTicketRequest:
      type: object
      properties:
        requestTypeId:
          type: string
          format: uuid
          nullable: true
        equipmentId:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
          maxLength: 255
          default: ""
        description:
          type: string
          nullable: true
        priority:
          type: string
          maxLength: 32
          default: MEDIUM
        assigneeId:
          type: string
          format: uuid
          nullable: true
    AssignTicketRequest:
      type: object
      properties:
        assigneeId:
          type: string
          format: uuid
          nullable: true
    ChangeTicketStatusRequest:
      type: object
      properties:
        status:
          type: string
          maxLength: 32
          default: ""
    AddTicketCommentRequest:
      type: object
      properties:
        commentText:
          type: string
          maxLength: 4000
          default: ""
        isInternal:
          type: boolean
          default: false
    TicketResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        ticketNumber:
          type: string
        requestTypeId:
          type: string
          format: uuid
          nullable: true
        requesterId:
          type: string
          format: uuid
          nullable: true
        assigneeId:
          type: string
          format: uuid
          nullable: true
        equipmentId:
          type: string
          format: uuid
          nullable: true
        workOrderId:
          type: string
          format: uuid
          nullable: true
        linkedWorkOrderId:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
        description:
          type: string
          nullable: true
        priority:
          type: string
        status:
          type: string
          enum: [OPEN, ASSIGNED, IN_PROGRESS, WAITING_EXTERNAL, RESOLVED, CLOSED, CANCELLED]
        openedAt:
          type: string
          format: date-time
        assignedAt:
          type: string
          format: date-time
          nullable: true
        resolvedAt:
          type: string
          format: date-time
          nullable: true
        closedAt:
          type: string
          format: date-time
          nullable: true
        dueAt:
          type: string
          format: date-time
          nullable: true
        createdBy:
          type: string
          format: uuid
          nullable: true
        updatedBy:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    TicketCommentResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        ticketId:
          type: string
          format: uuid
        commentText:
          type: string
        isInternal:
          type: boolean
        createdBy:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
    TicketAttachmentResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        ticketId:
          type: string
          format: uuid
        fileName:
          type: string
        mimeType:
          type: string
          nullable: true
        fileSize:
          type: integer
          nullable: true
        uploadedBy:
          type: string
          format: uuid
          nullable: true
        uploadedAt:
          type: string
          format: date-time
  responses:
    400BadRequest:
      description: Invalid request parameters or input payload.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    401Unauthorized:
      description: Basic authentication credentials missing or invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    403Forbidden:
      description: Authenticated user does not have the required permissions.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    404NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
