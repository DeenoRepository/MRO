spring:
  application:
    name: mro-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/mro
    username: mro
    password: mro
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

